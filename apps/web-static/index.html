<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0e1419" />
    <meta
      name="description"
      content="echo — Timeline personnelle pour écrire, enregistrer et conserver des souvenirs."
    />
    <!-- Optionnel : base URL de l'API (sinon window.ECHO_API_BASE_URL ou http://localhost:8000) -->
    <meta name="echo-api-base" content="http://localhost:8000" />

    <title>echo — Accueil</title>

    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <a class="sr-only" href="#main">Aller au contenu principal</a>

    <div class="page-glow" aria-hidden="true"></div>

    <header class="topbar" role="banner">
      <div class="topbar-inner">
        <a class="brand" href="/" aria-label="echo (accueil)">
          <svg class="brand-mark" viewBox="0 0 90 24" role="img" aria-label="echo">
            <text
              x="0"
              y="18"
              font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
              font-size="20"
              font-weight="600"
              letter-spacing="1"
              fill="currentColor"
            >
              echo
            </text>
          </svg>
        </a>

        <nav class="topbar-actions" aria-label="Compte">
          <a class="topbar-pill new-link" href="/" aria-label="Tell a new memory">New memory</a>
          <a class="topbar-pill login-link" href="./login.html">Log in</a>
        </nav>
      </div>
    </header>

    <div class="app-shell">
      <aside class="sidebar" aria-label="Timeline">
        <nav aria-label="Souvenirs">
          <div class="sidebar-inner">
            <div class="sidebar-head" aria-hidden="true"></div>
            <ul class="sidebar-list" id="sidebar-list" aria-label="Navigation timeline"></ul>
          </div>
        </nav>
      </aside>

      <main id="main" class="hero" role="main">
        <h1>Que veux-tu transmettre aujourd’hui ?</h1>

<form
  class="composer-grid"
  action="#"
  method="post"
  enctype="multipart/form-data"
  aria-label="Créer une entrée"
>
  <!-- Ligne 1: TEXTE (full) -->
  <section class="composer-text" aria-label="Texte">
    <label for="echo-input" class="sr-only">Texte</label>
    <textarea
      id="echo-input"
      name="text"
      rows="4"
      placeholder=""
      autocomplete="off"
      autocapitalize="sentences"
      spellcheck="true"
    ></textarea>
  </section>

  <!-- Ligne 2: VOICE (gauche) -->
  <section class="composer-voice" aria-label="Audio">
    <div class="action-row">
      <button
        id="audio-btn"
        class="icon-btn icon-btn--mic"
        type="button"
        aria-label="Enregistrer un audio"
        aria-pressed="false"
      >
        <!-- mic icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2Z"
          />
        </svg>
      </button>

      <audio id="audio-preview" controls hidden></audio>
      <span id="audio-status" class="muted">Prêt.</span>

      <button
        id="audio-clear"
        class="icon-btn icon-btn--ghost"
        type="button"
        aria-label="Supprimer l'enregistrement"
        disabled
      >
        <!-- trash icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M9 3h6l1 2h4v2H4V5h4l1-2Zm1 6h2v9h-2V9Zm4 0h2v9h-2V9ZM7 9h2v9H7V9Z"
          />
        </svg>
      </button>
    </div>
  </section>

  <!-- Ligne 2: IMAGES (droite) -->
  <section class="composer-images" aria-label="Images">
    <div class="action-row action-row--images">
      <label class="icon-btn icon-btn--plus" for="images-input" aria-label="Ajouter des images">
        <!-- plus icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M11 5h2v14h-2V5Zm-6 6h14v2H5v-2Z" />
        </svg>
      </label>
      <input id="images-input" name="images" type="file" accept="image/*" multiple hidden />

      <div id="images-preview" class="images-grid" aria-live="polite"></div>
    </div>
  </section>

  <!-- Ligne 3: SUBMIT (bas-droite) -->
  <div class="composer-submit">
    <button
      type="submit"
      class="icon-btn icon-btn--submit"
      aria-label="Envoyer"
      title="Envoyer"
    >
      <!-- arrow up icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="currentColor"
          d="M12 4l6.5 6.5-1.4 1.4L13 7.8V20h-2V7.8L6.9 11.9 5.5 10.5 12 4Z"
        />
      </svg>
    </button>
  </div>
</form>

        <noscript>
          <p style="opacity: 0.75; margin-top: 1rem;">
            JavaScript est désactivé. La timeline interactive ne sera pas disponible.
          </p>
        </noscript>
      </main>
    </div>

    <script src="./api.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
